[build]
  command = "pip install -r requirements.txt"
  publish = "frontend"

[functions]
  # On pointe vers la racine du projet pour être sûr de tout inclure
  directory = "netlify/functions"
  node_bundler = "esbuild" # Optionnel, aide parfois à la stabilité

[[redirects]]
  from = "/api/*"
  # /main/ fait référence à main.py. Si ton fichier s'appelle api.py, mets /api/
  to = "/.netlify/functions/main/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200