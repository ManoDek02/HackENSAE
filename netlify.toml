[build]
  publish = "frontend"

[functions]
  directory = "functions"
  # Copie le dossier backend/ dans le bundle de la function
  # Sur Netlify/Lambda, backend/ sera au même niveau que main.py
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/main"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200