<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — HackENSAE</title>
  <link rel="stylesheet" href="../css/design-system.css"/>
  <style>
    body{background:var(--gray-50);}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-6);}
    .card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-xl);padding:var(--space-8);width:100%;max-width:420px;}
    .logo{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-6);}
    .logo-mark{width:36px;height:36px;background:var(--blue-900);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;}
    .tab-row{display:flex;gap:var(--space-2);background:var(--gray-100);border-radius:var(--radius-md);padding:4px;margin-bottom:var(--space-6);}
    .auth-tab{flex:1;padding:7px;border-radius:var(--radius-sm);font-size:0.8125rem;font-weight:500;border:none;cursor:pointer;background:transparent;color:var(--gray-500);transition:all var(--transition);}
    .auth-tab.active{background:var(--white);color:var(--blue-900);}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 18 18" fill="none" width="18" height="18"><path d="M3 14L9 4L15 14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 10H12.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <span style="font-size:1.05rem;font-weight:500;color:var(--blue-900);">HackENSAE</span>
    </div>
    <div class="tab-row">
      <button class="auth-tab active" onclick="setMode('login',this)">Se connecter</button>
      <button class="auth-tab" onclick="setMode('register',this)">Créer un compte</button>
    </div>
    <div id="form-login">
      <h2 style="font-size:1.35rem;font-weight:500;color:var(--blue-900);margin-bottom:6px;">Bon retour</h2>
      <p style="font-size:0.875rem;color:var(--gray-500);margin-bottom:var(--space-6);">Connectez-vous pour accéder à votre espace.</p>
      <div class="form-group" style="margin-bottom:var(--space-4);"><label class="form-label">Email <span class="required">*</span></label><input class="form-control" type="email" id="l-email" placeholder="prenom.nom@ensae.sn"/></div>
      <div class="form-group" style="margin-bottom:var(--space-5);"><label class="form-label">Mot de passe <span class="required">*</span></label><input class="form-control" type="password" id="l-pwd" placeholder="••••••••"/></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Se connecter</button>
    </div>
    <div id="form-register" class="hidden">
      <h2 style="font-size:1.35rem;font-weight:500;color:var(--blue-900);margin-bottom:6px;">Créer un compte</h2>
      <p style="font-size:0.875rem;color:var(--gray-500);margin-bottom:var(--space-6);">Rejoignez la plateforme des hackathons ENSAE.</p>
      <div class="form-grid-2" style="margin-bottom:var(--space-3);">
        <div class="form-group"><label class="form-label">Prénom <span class="required">*</span></label><input class="form-control" type="text" id="r-prenom" placeholder="Amadou"/></div>
        <div class="form-group"><label class="form-label">Nom <span class="required">*</span></label><input class="form-control" type="text" id="r-nom" placeholder="Ba"/></div>
      </div>
      <div class="form-group" style="margin-bottom:var(--space-3);"><label class="form-label">Email <span class="required">*</span></label><input class="form-control" type="email" id="r-email" placeholder="prenom.nom@ensae.sn"/></div>
      <div class="form-group" style="margin-bottom:var(--space-3);"><label class="form-label">Mot de passe <span class="required">*</span></label><input class="form-control" type="password" id="r-pwd" placeholder="8 caractères minimum"/></div>
      <div class="form-group" style="margin-bottom:var(--space-5);"><label class="form-label">Rôle</label><select class="form-control" id="r-role" onchange="toggleCodeField(this.value)">
        <option value="participant">Participant</option>
        <option value="organisateur">Organisateur</option>
      </select></div>
      <div class="form-group" style="margin-bottom:var(--space-5);display:none;" id="code-group">
        <label class="form-label">Code d'invitation organisateur <span class="required">*</span></label>
        <input class="form-control" type="password" id="r-code" placeholder="Code secret"/>
        <span class="form-hint">Contactez le responsable du Club Informatique pour obtenir ce code.</span>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Créer mon compte</button>
    </div>
    <div style="text-align:center;margin-top:var(--space-5);font-size:0.875rem;color:var(--gray-500);">
      <a href="../index.html" style="color:var(--blue-600);">Retour à l'accueil</a>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>

function toggleCodeField(role) {
  const group = document.getElementById('code-group');
  if (group) group.style.display = role === 'organisateur' ? 'block' : 'none';
}

function setMode(mode,btn){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-login').classList.toggle('hidden',mode!=='login');
  document.getElementById('form-register').classList.toggle('hidden',mode!=='register');
}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pwd=document.getElementById('l-pwd').value;
  if(!email||!pwd){toast('Remplissez tous les champs.','error');return;}
  try {
    const data = await apiFetch('/auth/login',{
      method:'POST', body:JSON.stringify({email,password:pwd})
    });
    Auth.save(data.access_token, data.user);
    toast('Connexion réussie !','success');
    const redirect = data.user.role==='organisateur'?'./dashboard-organisateur.html':'./mon-espace.html';
    setTimeout(()=>window.location.href=redirect, 800);
  } catch(err) {
    toast(err.message||'Email ou mot de passe incorrect.','error');
  }
}
async function doRegister(){
  const prenom = document.getElementById('r-prenom').value.trim();
  const nom    = document.getElementById('r-nom').value.trim();
  const email  = document.getElementById('r-email').value.trim();
  const pwd    = document.getElementById('r-pwd').value;
  const role   = document.getElementById('r-role').value;
  const code   = document.getElementById('r-code')?.value.trim() || '';

  if (!prenom||!nom||!email||!pwd) { toast('Remplissez tous les champs obligatoires.','error'); return; }
  if (pwd.length < 8) { toast('Mot de passe trop court (8 caractères min).','error'); return; }
  if (role === 'organisateur' && !code) { toast('Le code d\'invitation est requis.','error'); return; }

  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ email, prenom, nom, password: pwd, role, organizer_code: code })
    });
    Auth.save(data.access_token, data.user);

    // Avertir si le code était mauvais (rôle rétrogradé silencieusement)
    if (role === 'organisateur' && data.user.role !== 'organisateur') {
      toast('Code incorrect — compte créé en tant que participant.', 'warning');
      setTimeout(() => window.location.href = './mon-espace.html', 1500);
      return;
    }

    toast('Compte créé !', 'success');
    const redirect = data.user.role === 'organisateur'
      ? './dashboard-organisateur.html'
      : './mon-espace.html';
    setTimeout(() => window.location.href = redirect, 800);
  } catch(err) {
    toast(err.message || 'Erreur lors de la création du compte.', 'error');
  }
}
const p=new URLSearchParams(window.location.search);
if(p.get('role')==='organisateur'){
  setMode('register',document.querySelectorAll('.auth-tab')[1]);
  setTimeout(()=>{const s=document.getElementById('r-role');if(s)s.value='organisateur';},50);
}
</script>
</body>
</html>
