[build]
  command = "pip install -r requirements.txt"
  publish = "frontend"

[functions]
  # On indique le nouveau dossier
  directory = "netlify/functions"
  # On inclut le dossier backend pour que la fonction puisse faire ses imports
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  # Le nom 'main' correspond au nom de ton fichier 'main.py'
  to = "/.netlify/functions/main/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200