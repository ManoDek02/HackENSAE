[build]
  command = "pip install -r requirements.txt"
  publish = "frontend"

[functions]
  # On force Netlify à aller chercher main.py à la racine
  directory = "." 
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/main/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200