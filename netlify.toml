[build]
  publish = "frontend"

[functions]
  directory = "functions"
  # CRITIQUE : inclure le dossier backend/ dans le bundle de la function
  # Sans ça, Netlify ne déploie que functions/main.py et l'import de backend.* échoue
  included_files = ["backend/**", "backend/**/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/main"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200